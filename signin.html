<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="JBR7 BAGS LOGO.jpg" type="image/jpeg">
    <title>JBR7 Bags - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Load Poppins for a cleaner UI on the auth pages -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/JBR7 CSS/signin.css">
    <style>
        /* Back button for auth pages */

        /* Simple modal styles for Forgot Password */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-dialog {
            background: #fff;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 1.25rem 1.25rem;
            font-family: inherit;
        }

        .modal-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:0.5rem;
        }

        .modal-header h3 { margin:0; font-size:1.05rem; }

        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #333;
        }

        .modal-body p { margin:0 0 0.5rem 0; color:#333; font-size:0.95rem }

        .modal-body input[type="email"] {
            width:100%;
            padding:0.6rem 0.7rem;
            border:1px solid #ddd;
            border-radius:6px;
            margin-bottom:0.6rem;
            box-sizing:border-box;
        }

        .modal-footer { text-align:right; }

        .modal-footer .btn { padding:0.55rem 0.9rem; border-radius:6px; border:0; cursor:pointer }

        .btn-secondary { background:#eee; color:#222; margin-right:0.5rem }
        .btn-primary { background:#1a73e8; color:#fff }
    </style>
</head>
<body>
    
    <div class="logo-container">
        <img src="JBR7 BAGS LOGO.jpg" alt="JBR7 BAGS LOGO" class="logo-image" onerror="this.style.display='none'">

    <div class="logo-text">
        <span class="brand-name"></span>
        <span class="brand-tagline">MANUFACTURING</span>
    </div>
</div>
    
 

    <div class="auth-card">
        <!-- Single-mode auth: Sign In only -->
        <h2 style="text-align:center;margin-bottom:12px;color:#333;font-size:1.35rem">Sign In</h2>

    <form id="signin-form">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <i class="fa-regular fa-eye-slash eye-icon" onclick="(function(i){const inp=i.parentElement.querySelector('input'); if(inp.type==='password'){inp.type='text'; i.classList.remove('fa-eye-slash'); i.classList.add('fa-eye');} else {inp.type='password'; i.classList.remove('fa-eye'); i.classList.add('fa-eye-slash');}})(this)"></i>
                </div>
            </div>

            <button class="main-btn" type="submit" id="signin-submit-btn">Sign In</button>
            <div id="signin-error" style="display:none;color:#e53e3e;text-align:center;margin-top:1rem;font-size:0.9rem;"></div>

            <div style="text-align:center;margin-top:0.6rem">
                <a href="#" id="forgot-password-link" class="return-home">Forgot password?</a>
            </div>

            <div class="divider">OR</div>
            <div style="text-align:center;margin-top:0.6rem">
                <a href="index.html" class="return-home">Return to home</a>
            </div>
            <div style="text-align:center;margin-top:0.6rem">
                <span style="color:#333;margin-right:6px">Don't have an account?</span>
                <a href="signup.html" class="return-home">Sign Up</a>
            </div>
        </form>
    </div>
    
    <script src="jbr7js/user-storage.js"></script>
    <script>
        // Redirect only if user is logged in THIS session (same tab)
        (function() {
            var uid = sessionStorage.getItem('jbr7_user_id');
            if (uid && String(uid).trim() !== '' && String(uid) !== 'undefined') {
                window.location.replace('home.html');
                return;
            }
        })();
        // Pre-fill email and checkbox when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { applyRememberMe(); setTimeout(applyRememberMe, 50); });
        } else {
            applyRememberMe();
            setTimeout(applyRememberMe, 50);
        }

        // Intercept form submission to set user ID and optionally remember me
        document.getElementById('signin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = document.getElementById('signin-submit-btn');
            const errorDiv = document.getElementById('signin-error');
            const email = form.querySelector('input[name="email"]').value.trim();
            const password = form.querySelector('input[name="password"]').value;
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            errorDiv.style.display = 'none';
            
            fetch('/api/actions', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ 
                    action: 'signin',
                    email, 
                    password 
                })
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                }
                return response.json().then(err => Promise.reject(err));
            })
            .then(data => {
                if (data.success) {
                    if (data.user_id) {
                        var uid = data.user_id.toString();
                        sessionStorage.setItem('jbr7_user_id', uid);
                        sessionStorage.setItem('jbr7_auth_uid', uid);
                        sessionStorage.setItem('jbr7_user_email', email);
                    }
                    
                    if (typeof UserStorage !== 'undefined' && UserStorage && UserStorage.clearLegacyData) {
                        UserStorage.clearLegacyData();
                    }
                    
                    window.location.href = '/home.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                errorDiv.textContent = error.error || error.message || 'Login failed. Please try again.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            });
        });
    </script>
    
    <!-- Forgot password modal -->
    <div class="modal-overlay" id="forgot-modal" aria-hidden="true" role="dialog" aria-labelledby="forgot-modal-title">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="forgot-modal-title">Reset your password</h3>
                <button class="modal-close" id="forgot-modal-close" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Enter the email address for your account and we'll send instructions to reset your password.</p>
                <input type="email" id="forgot-email" placeholder="Your email address" required>
                <div id="forgot-error" style="display:none;color:#e53e3e;font-size:0.9rem;margin-bottom:0.5rem"></div>
                <div id="forgot-success" style="display:none;color:green;font-size:0.95rem;margin-bottom:0.5rem"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="forgot-cancel">Cancel</button>
                <button class="btn btn-primary" id="forgot-submit">Send reset email</button>
            </div>
        </div>
    </div>

    <script>
        (function(){
            var forgotLink = document.getElementById('forgot-password-link');
            if (!forgotLink) return;

            var modal = document.getElementById('forgot-modal');
            var closeBtn = document.getElementById('forgot-modal-close');
            var cancelBtn = document.getElementById('forgot-cancel');
            var submitBtn = document.getElementById('forgot-submit');
            var emailInput = document.getElementById('forgot-email');
            var errDiv = document.getElementById('forgot-error');
            var successDiv = document.getElementById('forgot-success');

            function openModal(){
                errDiv.style.display = 'none';
                successDiv.style.display = 'none';
                errDiv.textContent = '';
                successDiv.textContent = '';
                modal.classList.add('active');
                modal.setAttribute('aria-hidden','false');
                setTimeout(function(){ emailInput.focus(); }, 40);
            }

            function closeModal(){
                modal.classList.remove('active');
                modal.setAttribute('aria-hidden','true');
            }

            forgotLink.addEventListener('click', function(e){ e.preventDefault(); openModal(); });
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e){ if (e.target === modal) closeModal(); });

            function validEmail(v){
                return typeof v === 'string' && /\S+@\S+\.\S+/.test(v);
            }

            submitBtn.addEventListener('click', function(){
                var email = emailInput.value ? emailInput.value.trim() : '';
                if (!validEmail(email)){
                    errDiv.textContent = 'Please enter a valid email address.';
                    errDiv.style.display = 'block';
                    return;
                }

                // disable while sending
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                errDiv.style.display = 'none';
                successDiv.style.display = 'none';
                    // Prefer sending via EmailJS if configured (client-side send using your EmailJS template)
                    // Set these globals in your page (recommended) before this script runs:
                    //   window.EMAILJS_SERVICE_ID = 'your_service_id';
                    //   window.EMAILJS_PUBLIC_KEY = 'your_public_key';
                    // The template id used below is 'template_07a7ez2' as requested.
                    var emailjsService = window.EMAILJS_SERVICE_ID || null;
                    var emailjsKey = window.EMAILJS_PUBLIC_KEY || null;

                    // Build a reset URL — ideally this should be generated server-side with a secure token.
                    var resetUrl = window.PASSWORD_RESET_BASE_URL ? (window.PASSWORD_RESET_BASE_URL + '?email=' + encodeURIComponent(email)) : (location.origin + '/reset-password.html?email=' + encodeURIComponent(email));

                    if (emailjsService && emailjsKey && window.emailjs) {
                        // Initialize emailjs if not already
                        try { if (!emailjs._userID) emailjs.init(emailjsKey); } catch(e) { /* ignore */ }

                        var tplParams = {
                            to_name: '',
                            to_email: email,
                            reset_url: resetUrl
                        };

                        emailjs.send(emailjsService, 'template_07a7ez2', tplParams)
                        .then(function(resp){
                            successDiv.textContent = 'Reset instructions sent (check your email).';
                            successDiv.style.display = 'block';
                            setTimeout(function(){ closeModal(); submitBtn.disabled = false; submitBtn.textContent = 'Send reset email'; }, 2000);
                        })
                        .catch(function(err){
                            console.error('EmailJS send error:', err);
                            errDiv.textContent = 'Unable to send reset email via EmailJS. Check console for details.';
                            errDiv.style.display = 'block';
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Send reset email';
                        });
                        return;
                    }

                    // Fallback: send to server endpoint (if you implement server-side handling)
                    fetch('/api/actions', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({ action: 'forgot_password', email: email })
                    })
                    .then(function(res){
                        if (res.ok) return res.json();
                        return res.json().then(function(err){ return Promise.reject(err); });
                    })
                    .then(function(data){
                        if (data && data.success) {
                            successDiv.textContent = data.message || 'Reset instructions sent if the email exists in our system.';
                            successDiv.style.display = 'block';
                            setTimeout(function(){ closeModal(); submitBtn.disabled = false; submitBtn.textContent = 'Send reset email'; }, 2000);
                        } else {
                            var msg = (data && (data.error || data.message)) || 'Unable to send reset email. Please try again later.';
                            errDiv.textContent = msg;
                            errDiv.style.display = 'block';
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Send reset email';
                        }
                    })
                    .catch(function(err){
                        console.error('Forgot password error:', err);
                        var msg = (err && (err.error || err.message)) || 'Network or server error. Please try again.';
                        errDiv.textContent = msg;
                        errDiv.style.display = 'block';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Send reset email';
                    });
            });
        })();
    </script>

        <!-- EmailJS SDK (optional) - only required if you plan to send via EmailJS from the browser -->
        <script src="https://cdn.emailjs.com/sdk/3.2/email.min.js"></script>
</body>
</html>
