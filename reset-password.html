<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset password - JBR7 Bags</title>
  <link rel="stylesheet" href="/JBR7 CSS/signin.css">
  <style>
    body { font-family: Poppins, Arial, sans-serif; background:#f5f7f9; color:#222; }
    .container{ max-width:420px;margin:40px auto;padding:22px;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
    h2{margin:0 0 12px;font-size:1.4rem}
    label{display:block;margin:8px 0 6px;font-weight:600}
    input[type=password]{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
    .help{font-size:0.9rem;color:#666;margin-top:8px}
    .actions{text-align:right;margin-top:12px}
    .btn{padding:10px 14px;border-radius:6px;border:0;cursor:pointer}
    .btn-primary{background:#1a73e8;color:#fff}
    .error{color:#e53e3e;margin-top:10px}
    .success{color:green;margin-top:10px}
  </style>
</head>
<body>
  <div class="container">
    <h2>Set a new password</h2>
    <p class="help">Enter a new password for your account. This link is single-use and will expire.</p>

    <div id="form-wrap">
      <label for="password">New password</label>
      <input id="password" type="password" placeholder="Enter new password" autocomplete="new-password" />

      <label for="password2">Confirm password</label>
      <input id="password2" type="password" placeholder="Confirm new password" autocomplete="new-password" />

      <div id="feedback" class="error" style="display:none"></div>
      <div id="feedback-success" class="success" style="display:none"></div>

      <div class="actions">
        <button id="submit" class="btn btn-primary">Save password</button>
      </div>
    </div>

    <div id="invalid" style="display:none">
      <p style="color:#b33">This password reset link is invalid or has expired.</p>
    </div>
  </div>

  <script>
    // Helper to read query string
    function getQuery(name) {
      var url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    var token = getQuery('token');
    var email = getQuery('email'); // optional if your tokenless flow includes email

    var formWrap = document.getElementById('form-wrap');
    var invalidWrap = document.getElementById('invalid');
    var feedback = document.getElementById('feedback');
    var feedbackSuccess = document.getElementById('feedback-success');
    var submitBtn = document.getElementById('submit');

    if (!token) {
      formWrap.style.display = 'none';
      invalidWrap.style.display = 'block';
    } else {
      // Optionally verify token with the server to show friendly UI
      fetch('/api/actions', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify({ action: 'verify_reset_token', token: token })
      }).then(function(res){
        return res.json();
      }).then(function(data){
        if (!data || !data.success) {
          formWrap.style.display = 'none';
          invalidWrap.style.display = 'block';
        } else {
          // optionally show masked email
          if (data.email) {
            var el = document.createElement('p');
            el.style.fontSize='0.95rem';
            el.style.color='#444';
            var masked = data.email.replace(/(.{2})(.*)(@.*)/, function(m,a,b,c){ return a + (b? '***':'' ) + c });
            el.textContent = 'Resetting password for: ' + masked;
            formWrap.insertBefore(el, formWrap.firstChild);
          }
        }
      }).catch(function(err){
        formWrap.style.display = 'none';
        invalidWrap.style.display = 'block';
      });
    }

    function setError(msg){ feedback.style.display='block'; feedback.textContent = msg; feedbackSuccess.style.display='none'; }
    function setSuccess(msg){ feedbackSuccess.style.display='block'; feedbackSuccess.textContent = msg; feedback.style.display='none'; }

    submitBtn.addEventListener('click', function(){
      var p1 = document.getElementById('password').value || '';
      var p2 = document.getElementById('password2').value || '';
      feedback.style.display='none'; feedbackSuccess.style.display='none';

      if (p1.length < 8) { setError('Password must be at least 8 characters'); return; }
      if (p1 !== p2) { setError('Passwords do not match'); return; }
      if (!token) { setError('Missing token.'); return; }

      submitBtn.disabled = true; submitBtn.textContent = 'Saving...';

      fetch('/api/actions', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify({ action: 'reset_password', token: token, password: p1 })
      }).then(function(res){
        return res.json();
      }).then(function(data){
        if (data && data.success) {
          setSuccess(data.message || 'Password updated. You can now sign in.');
          setTimeout(function(){ window.location.href = '/signin.html'; }, 2200);
        } else {
          setError((data && (data.error || data.message)) || 'Unable to reset password');
        }
      }).catch(function(err){
        setError('Network error. Please try again.');
      }).finally(function(){ submitBtn.disabled = false; submitBtn.textContent = 'Save password'; });
    });
  </script>
</body>
</html>
