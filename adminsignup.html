<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JBR7 Bags - Admin Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="JBR7 CSS/signin.css">
</head>
<body>

<div class="auth-card">
    <h2 style="text-align:center;margin-bottom:12px;color:#333;font-size:1.35rem">
        Admin Registration
    </h2>

    <form id="admin-signup-form">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Enter admin email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-container">
                <input type="password" name="password" required placeholder="Create password">
                <i class="fa-regular fa-eye-slash eye-icon" onclick="togglePassword(this)"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-container">
                <input type="password" name="confirm_password" required placeholder="Confirm password">
                <i class="fa-regular fa-eye-slash eye-icon" onclick="togglePassword(this)"></i>
            </div>
        </div>

        <button class="main-btn" type="submit" id="signup-btn">
            Register Admin
        </button>

        <div id="signup-error" style="display:none;color:#e53e3e;text-align:center;margin-top:1rem;font-size:0.9rem;"></div>

        <div style="text-align:center;margin-top:1rem">
            <a href="adminlogin.html" class="return-home">Back to Login</a>
        </div>

    </form>
</div>

<script>
function togglePassword(el) {
    var inp = el.parentElement.querySelector('input');
    if (inp.type === 'password') {
        inp.type = 'text';
        el.classList.remove('fa-eye-slash');
        el.classList.add('fa-eye');
    } else {
        inp.type = 'password';
        el.classList.remove('fa-eye');
        el.classList.add('fa-eye-slash');
    }
}

document.getElementById('admin-signup-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var form = this;
    var errorDiv = document.getElementById('signup-error');
    var btn = document.getElementById('signup-btn');

    var name = form.name.value.trim();
    var email = form.email.value.trim();
    var password = form.password.value;
    var confirmPassword = form.confirm_password.value;

    errorDiv.style.display = 'none';

    if (password !== confirmPassword) {
        errorDiv.textContent = "Passwords do not match.";
        errorDiv.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = "Registering...";

    fetch('/api/actions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: 'admin-signup',
            name: name,
            email: email,
            password: password
        })
    })
    .then(r => r.ok ? r.json() : r.json().then(err => Promise.reject(err)))
    .then(data => {
        if (data.success) {
            alert("Admin registered successfully!");
            window.location.href = "adminlogin.html";
        } else {
            throw new Error(data.error || "Registration failed.");
        }
    })
    .catch(err => {
        errorDiv.textContent = err.message || "Something went wrong.";
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = "Register Admin";
    });
});
</script>

</body>
</html>
